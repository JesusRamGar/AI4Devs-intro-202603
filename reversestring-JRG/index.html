<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reverse String</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 40px;
        }

        .container {
            max-width: 800px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-reverse {
            background-color: #1e73d8;
            color: white;
        }

        .btn-copy {
            background-color: #6c757d;
            color: white;
            margin-top: 20px;
        }

        #result {
            font-size: 24px;
            margin-top: 20px;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Reverse String</h1>

    <input type="text" id="inputText" placeholder="Hello, welcome to AI4Devs" />

    <button id="reverseBtn" class="btn-reverse">
        Reverse 🔄
    </button>

    <div id="error" class="error"></div>

    <div id="result"></div>

    <button id="copyBtn" class="btn-copy">
        Copy 📋
    </button>
</div>

<script src="script.js"></script>
</body>
</html>
